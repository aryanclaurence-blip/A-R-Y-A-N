tooltip: >-
  ARYAN — ColorSplasher Pro. Enterprise-grade BIM visualization tool.
  Color visible elements by any parameter value with:
  multi-parameter compound keys, live search, count column,
  numeric heat maps, Revit link support, CSV/JSON export, and saved schemes.

  Upgrade of pyRevit ColorSplasher. All original functionality preserved.
  Requires an open Revit project.
